name: bangla_number_to_words
description: A pure Dart package to convert numbers and currency amounts into Bangla words using the Bangladeshi numbering system (শত, হাজার, লক্ষ, কোটি).
version: 1.0.0
homepage: https://github.com/Pritom-Chaki/bangla_number_to_words
repository: https://github.com/Pritom-Chaki/bangla_number_to_words

environment:
  sdk: ^3.0.0

dev_dependencies:
  test: ^1.24.0
  lints: ^5.0.0
